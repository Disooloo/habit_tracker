name: habit_tracker
description: Мягкий трекер привычек для людей с прокрастинацией и ADHD
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Database
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  sqflite_common_ffi_web: ^1.0.4
  path_provider: ^2.1.1
  path: ^1.8.3

  # Localization
  intl: ^0.20.2

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.2

  # Storage
  shared_preferences: ^2.2.2

  # UI
  flutter_svg: ^2.0.9
  url_launcher: ^6.3.2
  firebase_core: ^3.15.2
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.9
  google_sign_in: ^6.3.0
  firebase_storage: ^12.4.10
  image_picker: ^1.1.2
  country_picker: ^2.0.27

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "lib/img/logo.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true

  assets:
    - promo_keys.json
    - lib/img/logo.jpg

