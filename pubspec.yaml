name: habit_tracker
description: Мягкий трекер привычек для людей с прокрастинацией и ADHD
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Database
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  sqflite_common_ffi_web: ^1.0.4
  path_provider: ^2.1.1
  path: ^1.8.3

  # Localization
  intl: ^0.20.2

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.2

  # Storage
  shared_preferences: ^2.2.2

  # UI
  flutter_svg: ^2.0.9
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - promo_keys.json

